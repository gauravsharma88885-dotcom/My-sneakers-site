<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sneaker Store</title>

<style>

body{
font-family:Arial;
background:#f1f3f6;
margin:0;
}

header{
background:#2874f0;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.search{
display:flex;
justify-content:center;
padding:15px;
background:white;
}

.search input{
width:300px;
padding:10px;
border:1px solid #ccc;
border-radius:4px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.price{
color:#388e3c;
font-size:18px;
font-weight:bold;
}

.rating{
color:#ff9800;
margin:5px 0;
}

button{
background:#fb641b;
border:none;
padding:10px;
color:white;
width:100%;
margin-top:8px;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#e85a17;
}

</style>

</head>

<body>

<header>
Flipkart Style Sneaker Store
</header>

<div class="search">
<input type="text" id="search" placeholder="Search sneakers...">
</div>

<div class="products" id="products"></div>

<script>

let phone="918398876868"

let sneakers=[

{name:"Nike Air Force 1",price:130,img:"https://images.stockx.com/images/Nike-Air-Force-1-07-White.jpg"},
{name:"Air Jordan 1",price:170,img:"https://images.stockx.com/images/Air-Jordan-1-Retro-High-OG-Chicago-Reimagined.jpg"},
{name:"Yeezy 350",price:220,img:"https://images.stockx.com/images/adidas-Yeezy-Boost-350-V2-Zebra-2023.jpg"},
{name:"Nike Dunk Low",price:110,img:"https://images.stockx.com/images/Nike-Dunk-Low-Panda-2021.jpg"},
{name:"Air Jordan 4",price:190,img:"https://images.stockx.com/images/Air-Jordan-4-Retro-Military-Black.jpg"},

{name:"Yeezy 700",price:250,img:"https://images.stockx.com/images/adidas-Yeezy-Boost-700-Wave-Runner-2018.jpg"},
{name:"Nike Air Max",price:160,img:"https://images.stockx.com/images/Nike-Air-Max-90-White.jpg"},
{name:"Jordan 11",price:210,img:"https://images.stockx.com/images/Air-Jordan-11-Retro-Concord-2018.jpg"},
{name:"Nike Blazer",price:120,img:"https://images.stockx.com/images/Nike-Blazer-Mid-77-Vintage-White-Black.jpg"},
{name:"Yeezy Foam",price:140,img:"https://images.stockx.com/images/adidas-Yeezy-Foam-RNNR-Sand.jpg"},

{name:"Jordan 3",price:180,img:"https://images.stockx.com/images/Air-Jordan-3-Retro-White-Cement-Reimagined.jpg"},
{name:"Nike Dunk Grey",price:115,img:"https://images.stockx.com/images/Nike-Dunk-Low-Grey-Fog.jpg"},
{name:"Air Max 97",price:170,img:"https://images.stockx.com/images/Nike-Air-Max-97-Silver-Bullet.jpg"},
{name:"Jordan 5",price:200,img:"https://images.stockx.com/images/Air-Jordan-5-Retro-Fire-Red-2020.jpg"},
{name:"Yeezy Slide",price:90,img:"https://images.stockx.com/images/adidas-Yeezy-Slide-Bone.jpg"},

{name:"Jordan 6",price:195,img:"https://images.stockx.com/images/Air-Jordan-6-Retro-Infrared-2019.jpg"},
{name:"Nike Pegasus",price:140,img:"https://images.stockx.com/images/Nike-Air-Zoom-Pegasus-38-White.jpg"},
{name:"Jordan 12",price:220,img:"https://images.stockx.com/images/Air-Jordan-12-Retro-Playoffs-2022.jpg"},
{name:"Nike Cortez",price:100,img:"https://images.stockx.com/images/Nike-Cortez-White-Black.jpg"},
{name:"Yeezy 500",price:210,img:"https://images.stockx.com/images/adidas-Yeezy-500-Blush.jpg"},

{name:"Jordan 13",price:205,img:"https://images.stockx.com/images/Air-Jordan-13-Retro-Bred-2017.jpg"},
{name:"Nike React",price:150,img:"https://images.stockx.com/images/Nike-React-Vision-White.jpg"},
{name:"Jordan 14",price:210,img:"https://images.stockx.com/images/Air-Jordan-14-Retro-Last-Shot-2018.jpg"},
{name:"Nike Vapormax",price:230,img:"https://images.stockx.com/images/Nike-Air-VaporMax-Plus-Black.jpg"},
{name:"Yeezy 380",price:200,img:"https://images.stockx.com/images/adidas-Yeezy-Boost-380-Alien.jpg"}

]

function loadProducts(list){

let container=document.getElementById("products")
container.innerHTML=""

list.forEach(p=>{

container.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="rating">⭐⭐⭐⭐☆</div>

<div class="price">$${p.price}</div>

<button onclick="order('${p.name}',${p.price})">
Order on WhatsApp
</button>

</div>

`

})

}

function order(name,price){

let message="Hi I want to buy "+name+" - $"+price

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

location.href=url

}

document.getElementById("search").addEventListener("keyup",function(){

let term=this.value.toLowerCase()

let filtered=sneakers.filter(p=>p.name.toLowerCase().includes(term))

loadProducts(filtered)

})

loadProducts(sneakers)

</script>

</body>
    </html>
