<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sneaker Vault</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.highlight{
color:#ff3b3b;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#ff3b3b;
margin:10px 0;
}

button{
background:#ff3b3b;
border:none;
padding:10px;
color:white;
border-radius:20px;
cursor:pointer;
}

.admin{
margin-top:40px;
background:#1b1b1b;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:none;
}

</style>

</head>

<body>

<h1>Sneaker <span class="highlight">Vault</span></h1>

<div id="products" class="container"></div>

<div class="admin">

<h2>Admin Panel</h2>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

</div>

<script>

let phone="918398876868"

let products=JSON.parse(localStorage.getItem("products")) || []

function saveProducts(){
localStorage.setItem("products",JSON.stringify(products))
}

function loadProducts(){

let container=document.getElementById("products")

container.innerHTML=""

products.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h3>${p.name}</h3>

<div class="price">$${p.price}</div>

<button onclick="order('${p.name}',${p.price})">
Order on WhatsApp
</button>

</div>

`

})

}

function addProduct(){

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let image=document.getElementById("image").value

products.push({name,price,image})

saveProducts()

loadProducts()

}

function order(name,price){

let message="Hi I want to order:\n"+name+" - $"+price

let url="https://wa.me/"+phone+"?text="+encodeURIComponent(message)

location.href=url

}

loadProducts()

</script>

</body>
</html>
