<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DELHIKICKS</title>

<style>

body{
font-family:Arial;
background:#f1f3f6;
margin:0;
}

header{
background:#2874f0;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:20px;
}

.search input{
padding:8px;
border:none;
border-radius:4px;
}

.cartBtn{
background:#fb641b;
border:none;
padding:8px 12px;
color:white;
border-radius:4px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
position:relative;
}

.card img{
width:100%;
height:180px;
object-fit:contain;
cursor:pointer;
}

.wish{
position:absolute;
right:10px;
top:10px;
font-size:20px;
cursor:pointer;
}

.title{
font-size:14px;
margin:10px 0;
}

.rating{
background:#388e3c;
color:white;
padding:2px 6px;
font-size:12px;
border-radius:4px;
display:inline-block;
}

.price{
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
font-size:12px;
}

button{
background:#fb641b;
border:none;
color:white;
padding:8px;
margin-top:8px;
width:100%;
border-radius:4px;
cursor:pointer;
}

.cart{
position:fixed;
right:0;
top:0;
width:300px;
height:100%;
background:white;
box-shadow:-2px 0 8px rgba(0,0,0,0.2);
padding:15px;
display:none;
overflow:auto;
}

.cart-item{
margin-bottom:8px;
}

.remove{
background:red;
width:auto;
padding:2px 6px;
margin-left:10px;
}

.total{
font-weight:bold;
margin-top:10px;
}

.order{
background:green;
}

.menu{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100vh;
background:white;
box-shadow:2px 0 8px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
z-index:999;
}

.menu button{
display:block;
width:100%;
background:none;
border:none;
padding:12px;
text-align:left;
font-size:16px;
cursor:pointer;
color:black;
}

.menu button:hover{
background:#f1f3f6;
}

</style>
</head>

<body>

<header>

<button onclick="openMenu()" style="background:none;border:none;color:white;font-size:22px">
☰
</button>

<h1>DELHIKICKS</h1>

<div class="search">
<input type="text" id="search" placeholder="Search sneakers">
</div>

<button class="cartBtn" onclick="toggleCart()">Cart</button>

</header>

<div class="products" id="products"></div>

<div class="menu" id="menu">

<button onclick="closeMenu()">✖ Close</button>

<h3>Sneaker Store</h3>

<button onclick="login()">Login</button>
<button onclick="join()">Join</button>

<hr>

<button onclick="myAccount()">My Account</button>
<button onclick="trackOrder()">Track Order</button>
<button onclick="stores()">Stores</button>
<button onclick="help()">Help</button>
<button onclick="wishlist()">Wishlist</button>

</div>

<div class="cart" id="cart">

<button onclick="toggleCart()" style="background:red;width:auto;padding:4px">✖</button>

<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total">Total ₹<span id="total">0</span></div>

<button class="order" onclick="order()">Order on WhatsApp</button>

</div>

<script>

function openMenu(){
document.getElementById("menu").style.left="0"
}

function closeMenu(){
document.getElementById("menu").style.left="-260px"
}

function login(){ alert("Login coming soon") }
function join(){ alert("Signup coming soon") }
function myAccount(){ alert("My Account page") }

function trackOrder(){
let id=prompt("Enter Order ID")
if(id) alert("Tracking Order "+id)
}

function stores(){ alert("Stores in Delhi, Mumbai, Bangalore") }
function help(){ alert("Contact support on WhatsApp") }
function wishlist(){ alert("Wishlist coming soon") }

let phone="918398876868"

let sneakers=[
{name:"Nike Air Force 1",price:2999,old:3999,img:"https://picsum.photos/300?1"},
{name:"Nike Dunk Low Panda",price:3499,old:4599,img:"https://picsum.photos/300?2"},
{name:"Nike Air Max 90",price:3799,old:4999,img:"https://picsum.photos/300?3"},
{name:"Nike Air Max 97",price:3999,old:5299,img:"https://picsum.photos/300?4"},
{name:"Adidas Yeezy 350",price:6999,old:8999,img:"https://picsum.photos/300?5"},
{name:"Adidas Ultraboost",price:5999,old:7799,img:"https://picsum.photos/300?6"},
{name:"Puma RS-X",price:3499,old:4499,img:"https://picsum.photos/300?7"},
{name:"Puma Cali",price:3199,old:4199,img:"https://picsum.photos/300?8"}
]

let cart=[]

function loadProducts(list){

let container=document.getElementById("products")
container.innerHTML=""

list.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<div class="wish">❤️</div>

<img src="${p.img}" onclick="productDetail(${i})">

<div class="title">${p.name}</div>

<div class="rating">4.3 ★</div>

<div class="price">₹${p.price}</div>

<div class="old">₹${p.old}</div>

<button onclick="addCart(${i})">Add to Cart</button>

</div>

`

})

}

function productDetail(i){

let p=sneakers[i]

alert(
"Product: "+p.name+
"\nPrice: ₹"+p.price+
"\nOld Price: ₹"+p.old+
"\n\nBest selling sneaker 👟"
)

}

function addCart(i){

cart.push(sneakers[i])
updateCart()

}

function removeCart(index){

cart.splice(index,1)
updateCart()

}

function updateCart(){

let cartItems=document.getElementById("cartItems")
let total=0

cartItems.innerHTML=""

cart.forEach((item,index)=>{

total+=item.price

cartItems.innerHTML+=`

<div class="cart-item">
${item.name} - ₹${item.price}
<button class="remove" onclick="removeCart(${index})">X</button>
</div>

`

})

document.getElementById("total").innerText=total

}

function toggleCart(){

let c=document.getElementById("cart")
c.style.display = c.style.display==="block" ? "none":"block"

}

function order(){

let message="Hi I want to order:%0A"
let total=0

cart.forEach(item=>{
message+=item.name+" ₹"+item.price+"%0A"
total+=item.price
})

message+="Total ₹"+total

window.open("https://wa.me/"+phone+"?text="+message)

}

document.getElementById("search").addEventListener("keyup",function(){

let term=this.value.toLowerCase()

let filtered=sneakers.filter(p=>p.name.toLowerCase().includes(term))

loadProducts(filtered)

})

loadProducts(sneakers)

</script>

</body>
    </html>
