 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sneaker Vault</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.highlight{
color:#ff4747;
}

.search{
display:flex;
justify-content:center;
margin-bottom:30px;
}

.search input{
padding:10px;
width:250px;
border-radius:20px;
border:none;
background:#1f1f1f;
color:white;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
max-width:1100px;
margin:auto;
}

.card{
background:#1b1b1b;
padding:15px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#ff4747;
font-size:20px;
margin:10px 0;
}

button{
background:#ff4747;
border:none;
padding:10px 15px;
border-radius:20px;
color:white;
cursor:pointer;
}

button:hover{
background:#ff6b6b;
}

.cart{
position:fixed;
right:20px;
top:20px;
background:#1b1b1b;
padding:15px;
width:260px;
border-radius:10px;
}

.cart h3{
margin-top:0;
}

.cart-item{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:6px;
}

.remove{
color:red;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Sneaker <span class="highlight">Vault</span></h1>

<div class="search">
<input type="text" id="search" placeholder="Search sneakers">
</div>

<div class="gallery" id="products"></div>

<div class="cart">

<h3>🛒 Cart</h3>

<div id="cartItems"></div>

<p>Total: $<span id="total">0</span></p>

<button onclick="order()">Order on WhatsApp</button>

</div>

<script>

let phone="918398876868"

let productList=[

{name:"Air Jordan 1",price:170,img:"https://images.stockx.com/images/Air-Jordan-1-Retro-High-OG-Chicago-Reimagined.jpg"},

{name:"Yeezy 350",price:220,img:"https://images.stockx.com/images/adidas-Yeezy-Boost-350-V2-Zebra-2023.jpg"},

{name:"Nike Dunk Low",price:110,img:"https://images.stockx.com/images/Nike-Dunk-Low-Panda-2021.jpg"},

{name:"Air Force 1",price:130,img:"https://images.stockx.com/images/Nike-Air-Force-1-07-White.jpg"}

]

let cart=[]

function loadProducts(){

let container=document.getElementById("products")
container.innerHTML=""

productList.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">$${p.price}</div>

<button onclick="addCart(${i})">Add to Cart</button>

</div>

`

})

}

function addCart(index){

cart.push(productList[index])

updateCart()

}

function removeCart(i){

cart.splice(i,1)

updateCart()

}

function updateCart(){

let cartItems=document.getElementById("cartItems")

cartItems.innerHTML=""

let total=0

cart.forEach((item,i)=>{

total+=item.price

cartItems.innerHTML+=`

<div class="cart-item">

${item.name} - $${item.price}

<span class="remove" onclick="removeCart(${i})">x</span>

</div>

`

})

document.getElementById("total").innerText=total

}

function order(){

let message="Hi I want to order:%0A"

let total=0

cart.forEach(item=>{

message+=item.name+" - $"+item.price+"%0A"

total+=item.price

})

message+="Total: $"+total

window.open("https://wa.me/"+phone+"?text="+message)

}

document.getElementById("search").addEventListener("keyup",function(){

let term=this.value.toLowerCase()

productList=productList.filter(p=>p.name.toLowerCase().includes(term))

loadProducts()

})

loadProducts()

</script>

</body>
</html>
