let cart=[]

function loadProducts(list){

let container=document.getElementById("products")

container.innerHTML=""

list.forEach((p,i)=>{

container.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="title">${p.name}</div>

<div class="rating">4.3 ★</div>

<div class="price">₹${p.price}</div>

<div class="old">₹${p.old}</div>

<button onclick="addCart(${i})">Add to Cart</button>

</div>

`

})

}

function addCart(index){

cart.push(sneakers[index])

updateCart()

}

function updateCart(){

let cartItems=document.getElementById("cartItems")

let total=0

cartItems.innerHTML=""

cart.forEach(item=>{

total+=item.price

cartItems.innerHTML+=`
<div class="cart-item">${item.name} - ₹${item.price}</div>
`

})

document.getElementById("total").innerText=total

}

function toggleCart(){

let cartBox=document.getElementById("cart")

cartBox.style.display = cartBox.style.display==="block" ? "none" : "block"

}

function order(){

let message="Hi I want to order:%0A"

let total=0

cart.forEach(item=>{
message+=item.name+" - ₹"+item.price+"%0A"
total+=item.price
})

message+="Total ₹"+total

let url="https://wa.me/"+phone+"?text="+message

location.href=url

}

document.getElementById("search").addEventListener("keyup",function(){

let term=this.value.toLowerCase()

let filtered=sneakers.filter(p=>p.name.toLowerCase().includes(term))

loadProducts(filtered)

})
