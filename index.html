     <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakersKicks.in | Premium Collection</title>
    <style>
        /* Global Styles */
        body { font-family: 'Arial', sans-serif; margin: 0; background-color: #fff; color: #333; }
        
        /* Header & Navigation */
        header { 
            position: sticky; top: 0; background: white; 
            border-bottom: 1px solid #eee; z-index: 1000; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        nav a { margin: 0 15px; text-decoration: none; color: #000; font-weight: 500; font-size: 14px; }

        /* Banner */
        .page-title { text-align: center; padding: 40px 0; background: #f8f8f8; }
        .page-title h1 { margin: 0; font-size: 28px; text-transform: uppercase; }

        /* Product Grid */
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 30px; 
        }

        /* Product Card */
        .product-card { position: relative; overflow: hidden; transition: 0.3s; cursor: pointer; }
        .product-card:hover .product-img { transform: scale(1.05); }
        .product-img-wrapper { background: #fdfdfd; padding: 20px; border-radius: 8px; position: relative; }
        .product-img { width: 100%; transition: 0.5s; }
        
        /* Badges */
        .badge { 
            position: absolute; top: 10px; left: 10px; 
            background: #003399; color: white; padding: 4px 12px; 
            font-size: 11px; font-weight: bold; border-radius: 2px;
        }

        /* Product Details */
        .details { padding: 15px 0; }
        .category { font-size: 12px; color: #777; margin-bottom: 5px; }
        .name { font-size: 16px; font-weight: bold; margin: 5px 0; }
        .price { font-size: 15px; color: #000; }
        .mrp { text-decoration: line-through; color: #999; font-size: 13px; margin-right: 5px; }

        /* Add to Cart Button */
        .btn-add {
            width: 100%; padding: 12px; background: #000; color: #fff;
            border: none; margin-top: 10px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">SNEAKERSKICKS</div>
    <nav>
        <a href="#">MEN</a>
        <a href="#">WOMEN</a>
        <a href="#">NEW ARRIVALS</a>
        <a href="#">SALE</a>
    </nav>
    <div class="icons">🛒 (0)</div>
</header>

<section class="page-title">
    <h1>Casual Sneakers</h1>
    <p>142 items found</p>
</section>

<div class="container">
    <div class="product-grid">
        
        <div class="product-card">
            <div class="product-img-wrapper">
                <span class="badge">NEW</span>
                <img src="https://via.placeholder.com/300x200?text=Sneaker+1" alt="Sneaker" class="product-img">
            </div>
            <div class="details">
                <div class="category">Men</div>
                <div class="name">HOTSHOT - RELEGATE</div>
                <div class="price">MRP ₹7,999.00</div>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img-wrapper">
                <span class="badge" style="background:#d9534f;">SALE</span>
                <img src="https://via.placeholder.com/300x200?text=Sneaker+2" alt="Sneaker" class="product-img">
            </div>
            <div class="details">
                <div class="category">Men</div>
                <div class="name">SHOGUN - LOBBY</div>
                <div class="price"><span class="mrp">₹8,499.00</span> ₹4,249.00</div>
            </div>
        </div>

        </div>
</div>

</body>
</html>
